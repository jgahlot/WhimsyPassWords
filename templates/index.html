<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <main class="scene">
        <!-- Background image layer -->
        <div class="bg" aria-hidden="true"></div>

        <!-- Water shimmer overlay -->
        <div class="water-shimmer" aria-hidden="true"></div>

        <!-- UI overlay -->
        <section class="ui" aria-label="Random Password Generator">
            <header class="header">
                <div class="subtitle-plank">
                    <p>— Select Password Strength —</p>
                </div>

                <div class="strength" role="radiogroup" aria-label="Select password strength">
                    <button class="pill easy" role="radio" aria-checked="true">Easy</button>
                    <button class="pill medium" role="radio" aria-checked="false">Medium</button>
                    <button class="pill hard" role="radio" aria-checked="false">Hard</button>
                </div>
            </header>

            <section class="controls" aria-label="Password settings">
                <div class="card">
                    <div class="label">Password Length:</div>
                    <div class="stepper" aria-label="Password length control">
                        <button class="step minus" aria-label="Decrease password length">−</button>
                        <output class="value" aria-live="polite">12</output>
                        <button class="step plus" aria-label="Increase password length">+</button>
                    </div>
                </div>

                <div class="card">
                    <div class="label">Uppercase Letters:</div>
                    <div class="stepper" aria-label="Uppercase letters control">
                        <button class="step minus" aria-label="Decrease uppercase letters">−</button>
                        <output class="value" aria-live="polite">2</output>
                        <button class="step plus" aria-label="Increase uppercase letters">+</button>
                    </div>
                </div>

                <div class="card">
                    <div class="label">Lowercase Letters:</div>
                    <div class="stepper" aria-label="Lowercase letters control">
                        <button class="step minus" aria-label="Decrease lowercase letters">−</button>
                        <output class="value" aria-live="polite">4</output>
                        <button class="step plus" aria-label="Increase lowercase letters">+</button>
                    </div>
                </div>

                <div class="card">
                    <div class="label">Numbers:</div>
                    <div class="stepper" aria-label="Numbers control">
                        <button class="step minus" aria-label="Decrease numbers">−</button>
                        <output class="value" aria-live="polite">3</output>
                        <button class="step plus" aria-label="Increase numbers">+</button>
                    </div>
                </div>

                <div class="card">
                    <div class="label">Special Characters:</div>
                    <div class="stepper" aria-label="Special characters control">
                        <button class="step minus" aria-label="Decrease special characters">−</button>
                        <output class="value" aria-live="polite">0</output>
                        <button class="step plus" aria-label="Increase special characters">+</button>
                    </div>
                </div>
            </section>

            <!-- Password output -->
            <section class="output-section" aria-label="Generated password">
                <div class="output-card">
                    <div class="output-header">
                        <span class="output-label">Your Password</span>
                        <button class="btn-copy" id="btn_copy" disabled aria-label="Copy password">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path
                                    d="M4 4V1.5A1.5 1.5 0 0 1 5.5 0h9A1.5 1.5 0 0 1 16 1.5v9a1.5 1.5 0 0 1-1.5 1.5H12v2.5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 0 14.5v-9A1.5 1.5 0 0 1 1.5 4H4zm1 0h7.5A1.5 1.5 0 0 1 14 5.5V12h.5a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5V4zm-4 1.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5v-9z" />
                            </svg>
                            Copy
                        </button>
                    </div>
                    <div class="output-box" id="password_box" tabindex="0">
                        <span class="output-placeholder">Click "Generate Password" to begin...</span>
                    </div>
                </div>
            </section>

            <footer class="footer">
                <button class="cta" id="btn_generate">Generate Password</button>
            </footer>

            <!-- Error banner -->
            <div class="banner-error" id="banner_error" role="alert" aria-live="polite"></div>
        </section>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
